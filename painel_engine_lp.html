<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel do Engine — Lapidar Pensante</title>

<script src="core_lp.js"></script>
<script src="engine_lp.js"></script>
<script src="memoria_simbiotica_lp.js"></script>
<script src="roteador_simbiotico_lp.js"></script>
<script src="monitor_integracao_lp_lb.js"></script>
<script src="ponte_lp_okapista.js"></script>
<script src="ponte_lp_avaliacao.js"></script>
<script src="ponte_lp_segunda_linguas.js"></script>
<script src="ponte_lp_diagramacao.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1017;
color:white;
}

header{
background:#111a27;
padding:25px;
border-bottom:1px solid #2a3b54;
}

h1{
margin:0;
font-size:28px;
}

.sub{
color:#aebbd3;
margin-top:5px;
}

.container{
max-width:1000px;
margin:auto;
padding:30px;
}

.panel{
background:#121b27;
border:1px solid #2a3b54;
border-radius:12px;
padding:25px;
}

button{
margin-top:10px;
margin-right:10px;
padding:12px 18px;
border:none;
background:#56a8ff;
color:#09111c;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#7bbcff;
}

.output{
margin-top:20px;
background:#0e1622;
padding:20px;
border-radius:8px;
border:1px solid #2a3b54;
white-space:pre-line;
line-height:1.6;
}

.back{
margin-top:25px;
display:inline-block;
cursor:pointer;
color:#aebbd3;
}
</style>

<script>
function executarCiclo(){
let resultado = LapidarPensanteEngine.executarEntradaManual()
document.getElementById("saida").innerText = resultado.join("\n")
}

function verificarStatus(){
let status = LapidarPensanteEngine.obterStatusCompleto()
document.getElementById("saida").innerText = JSON.stringify(status, null, 2)
}

function salvarMemoria(){
let resposta = MemoriaSimbioticaLP.salvar()
document.getElementById("saida").innerText = resposta
}

function carregarMemoria(){
let resposta = MemoriaSimbioticaLP.carregar()
document.getElementById("saida").innerText =
resposta + "\n\n" + MemoriaSimbioticaLP.ver()
}

function limparMemoria(){
let resposta = MemoriaSimbioticaLP.limpar()
document.getElementById("saida").innerText = resposta
}

function encaminharAutomaticamente(){
let resposta = RoteadorSimbioticoLP.encaminharAutomaticamente()
document.getElementById("saida").innerText = resposta
}

function verMapaDestino(){
let mapa = RoteadorSimbioticoLP.verMapaDeDestino()
document.getElementById("saida").innerText = mapa
}

function registrarIntegracao(){
let resposta = MonitorIntegracaoLPLB.registrarIntegracao()
document.getElementById("saida").innerText = resposta
}

function verIntegracao(){
let resposta = MonitorIntegracaoLPLB.verStatusIntegracao()
document.getElementById("saida").innerText = resposta
}

function validarIntegracao(){
let resposta = MonitorIntegracaoLPLB.validarIntegracao()
document.getElementById("saida").innerText = resposta
}

function limparIntegracao(){
let resposta = MonitorIntegracaoLPLB.limparIntegracao()
document.getElementById("saida").innerText = resposta
}

function enviarParaOKapista(){
let resposta = PonteLPOKapista.gerarPacoteVisual()
document.getElementById("saida").innerText = resposta
}

function verPacoteOKapista(){
let resposta = PonteLPOKapista.verPacoteVisual()
document.getElementById("saida").innerText = resposta
}

function validarPacoteOKapista(){
let resposta = PonteLPOKapista.validarPacote()
document.getElementById("saida").innerText = resposta
}

function limparPacoteOKapista(){
let resposta = PonteLPOKapista.limparPacote()
document.getElementById("saida").innerText = resposta
}

function enviarParaAvaliacao(){
let resposta = PonteLPAvaliacao.gerarPacoteAnalise()
document.getElementById("saida").innerText = resposta
}

function verPacoteAvaliacao(){
let resposta = PonteLPAvaliacao.verPacoteAnalise()
document.getElementById("saida").innerText = resposta
}

function validarPacoteAvaliacao(){
let resposta = PonteLPAvaliacao.validarPacoteAnalise()
document.getElementById("saida").innerText = resposta
}

function limparPacoteAvaliacao(){
let resposta = PonteLPAvaliacao.limparPacoteAnalise()
document.getElementById("saida").innerText = resposta
}

function enviarParaSegundaLinguas(){
let resposta = PonteLPSegundaLinguas.gerarPacoteTraducao()
document.getElementById("saida").innerText = resposta
}

function verPacoteSegundaLinguas(){
let resposta = PonteLPSegundaLinguas.verPacoteTraducao()
document.getElementById("saida").innerText = resposta
}

function validarPacoteSegundaLinguas(){
let resposta = PonteLPSegundaLinguas.validarPacoteTraducao()
document.getElementById("saida").innerText = resposta
}

function limparPacoteSegundaLinguas(){
let resposta = PonteLPSegundaLinguas.limparPacoteTraducao()
document.getElementById("saida").innerText = resposta
}

function enviarParaDiagramacao(){
let resposta = PonteLPDiagramacao.gerarPacoteDiagramacao()
document.getElementById("saida").innerText = resposta
}

function verPacoteDiagramacao(){
let resposta = PonteLPDiagramacao.verPacoteDiagramacao()
document.getElementById("saida").innerText = resposta
}

function validarPacoteDiagramacao(){
let resposta = PonteLPDiagramacao.validarPacoteDiagramacao()
document.getElementById("saida").innerText = resposta
}

function limparPacoteDiagramacao(){
let resposta = PonteLPDiagramacao.limparPacoteDiagramacao()
document.getElementById("saida").innerText = resposta
}
</script>

</head>

<body>

<header>
<h1>Painel do Engine</h1>
<div class="sub">
Executor simbiótico do Lapidar Pensante com memória, roteamento e pontes de integração
</div>
</header>

<div class="container">

<div class="panel">

<button onclick="executarCiclo()">
Executar ciclo completo
</button>

<button onclick="verificarStatus()">
Ver status do sistema
</button>

<br>

<button onclick="salvarMemoria()">
Salvar memória simbiótica
</button>

<button onclick="carregarMemoria()">
Carregar memória simbiótica
</button>

<button onclick="limparMemoria()">
Limpar memória simbiótica
</button>

<br>

<button onclick="encaminharAutomaticamente()">
Encaminhar automaticamente
</button>

<button onclick="verMapaDestino()">
Ver mapa de destino
</button>

<br>

<button onclick="registrarIntegracao()">
Registrar integração LP ↔ LB
</button>

<button onclick="verIntegracao()">
Ver integração
</button>

<button onclick="validarIntegracao()">
Validar integração
</button>

<button onclick="limparIntegracao()">
Limpar integração
</button>

<br>

<button onclick="enviarParaOKapista()">
Enviar pacote ao OKapista
</button>

<button onclick="verPacoteOKapista()">
Ver pacote do OKapista
</button>

<button onclick="validarPacoteOKapista()">
Validar pacote do OKapista
</button>

<button onclick="limparPacoteOKapista()">
Limpar pacote do OKapista
</button>

<br>

<button onclick="enviarParaAvaliacao()">
Enviar pacote à Avaliação
</button>

<button onclick="verPacoteAvaliacao()">
Ver pacote da Avaliação
</button>

<button onclick="validarPacoteAvaliacao()">
Validar pacote da Avaliação
</button>

<button onclick="limparPacoteAvaliacao()">
Limpar pacote da Avaliação
</button>

<br>

<button onclick="enviarParaSegundaLinguas()">
Enviar pacote à Segunda Língua(s)
</button>

<button onclick="verPacoteSegundaLinguas()">
Ver pacote da Segunda Língua(s)
</button>

<button onclick="validarPacoteSegundaLinguas()">
Validar pacote da Segunda Língua(s)
</button>

<button onclick="limparPacoteSegundaLinguas()">
Limpar pacote da Segunda Língua(s)
</button>

<br>

<button onclick="enviarParaDiagramacao()">
Enviar pacote à Diagramação
</button>

<button onclick="verPacoteDiagramacao()">
Ver pacote da Diagramação
</button>

<button onclick="validarPacoteDiagramacao()">
Validar pacote da Diagramação
</button>

<button onclick="limparPacoteDiagramacao()">
Limpar pacote da Diagramação
</button>

<div id="saida" class="output">
Aguardando execução do núcleo simbiótico...
</div>

</div>

<div class="back" onclick="location.href='index.html'">
← voltar ao painel principal
</div>

</div>

</body>
</html>
