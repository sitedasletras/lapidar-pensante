<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Lapidar Pensante — Engine Central</title>

<style>

body{

font-family:Arial;
background:#0b1c2c;
color:white;
text-align:center;
padding:40px;

}

button{

padding:15px;
margin:10px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:6px;

}

.bloco{

background:#142f46;
padding:30px;
border-radius:12px;
display:inline-block;

}

.titulo{

font-size:28px;
margin-bottom:20px;

}

.status{

margin-top:20px;
font-size:18px;

}

</style>

</head>


<body>


<div class="bloco">


<div class="titulo">

ENGINE CENTRAL — LAPIDAR PENSANTE

</div>


<button onclick="executarPipelineCompleto()">

Executar Pipeline Completo

</button>


<button onclick="executarPipelineAnalise()">

Executar Pipeline de Análise

</button>


<button onclick="executarPipelineLeve()">

Executar Pipeline Leve

</button>


<br><br>


<button onclick="ligarAutoExecutor()">

Iniciar AutoExecutor

</button>


<button onclick="desligarAutoExecutor()">

Parar AutoExecutor

</button>


<button onclick="verStatusAutoExecutor()">

Status AutoExecutor

</button>


<div class="status" id="statusExecutor">

Status: aguardando comando

</div>


</div>


<script src="detector_estado_lp.js"></script>
<script src="supervisor_pipeline_lp.js"></script>
<script src="orquestrador_lp.js"></script>
<script src="auto_executor_lp.js"></script>


<script>


function executarPipelineCompleto(){

OrquestradorLP.executarPipelineCompleto()

alert("Pipeline completo executado")

}


function executarPipelineAnalise(){

OrquestradorLP.executarPipelineAnalise()

alert("Pipeline análise executado")

}


function executarPipelineLeve(){

OrquestradorLP.executarPipelineLeve()

alert("Pipeline leve executado")

}


function ligarAutoExecutor(){

let resposta = AutoExecutorLP.iniciar()

document.getElementById("statusExecutor").innerText = resposta

}


function desligarAutoExecutor(){

let resposta = AutoExecutorLP.parar()

document.getElementById("statusExecutor").innerText = resposta

}


function verStatusAutoExecutor(){

let resposta = AutoExecutorLP.status()

document.getElementById("statusExecutor").innerText = resposta

}


</script>


</body>

</html>
