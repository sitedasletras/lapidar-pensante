<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Entrada da Obra — Lapidar Pensante</title>

<script src="core_lp.js"></script>
<script src="engine_lp.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1017;
color:white;
}

header{
background:#111a27;
padding:25px;
border-bottom:1px solid #2a3b54;
}

h1{
margin:0;
font-size:28px;
}

.sub{
color:#aebbd3;
margin-top:5px;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.panel{
background:#121b27;
border:1px solid #2a3b54;
border-radius:12px;
padding:25px;
}

input{

width:100%;
margin-top:10px;
margin-bottom:20px;
padding:10px;
border-radius:6px;
border:none;
font-size:16px;

}

button{

margin-top:10px;
padding:12px 18px;
border:none;
background:#56a8ff;
color:#09111c;
font-weight:bold;
border-radius:8px;
cursor:pointer;

}

button:hover{
background:#7bbcff;
}

.output{

margin-top:20px;
background:#0e1622;
padding:20px;
border-radius:8px;
border:1px solid #2a3b54;
white-space:pre-line;

}

.back{

margin-top:25px;
display:inline-block;
cursor:pointer;
color:#aebbd3;

}

</style>

<script>

function enviarObra(){

let titulo=document.getElementById("titulo").value
let autor=document.getElementById("autor").value
let genero=document.getElementById("genero").value


let obra={

titulo:titulo,
autor:autor,
genero:genero,
estrutura:"capítulos",
capitulos:[],
personagens:[],
clima:"não identificado",
status:"carregada manualmente"

}


let resposta=LapidarPensanteCore.carregarObra(obra)

document.getElementById("saida").innerText=resposta

}



function executarLeituraCompleta(){

let resultado=LapidarPensanteEngine.iniciarCicloCompleto(
LapidarPensanteCore.memoriaObra
)

document.getElementById("saida").innerText=
resultado.join("\n")

}

</script>

</head>

<body>

<header>

<h1>Entrada da Obra</h1>

<div class="sub">
Recepção simbiótica inicial do manuscrito
</div>

</header>

<div class="container">

<div class="panel">

Título da obra

<input id="titulo">

Autor

<input id="autor">

Gênero

<input id="genero">


<button onclick="enviarObra()">
Carregar obra no núcleo
</button>


<button onclick="executarLeituraCompleta()">
Executar ciclo completo
</button>


<div id="saida" class="output">

Aguardando entrada da obra...

</div>

</div>


<div class="back"
onclick="location.href='index.html'">

← voltar ao painel principal

</div>

</div>

</body>
</html>
